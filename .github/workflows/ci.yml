name: CI

on:
  push:
    branches:
      - main
      - "*.*"
  pull_request:
    branches:
      - "*"
  schedule:
    - cron: "0 0 * * MON"

env:
  CARGO_TERM_COLOR: always

jobs:
  lock:
    name: Cargo.lock
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v6

      - name: Install the Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          profile: minimal
          override: true

      - name: Generate the minimum version lockfile
        run: |
          cargo update -Z minimal-versions -Z direct-minimal-versions
          cargo update -p ndarray@0.15.0
          mv Cargo.lock Cargo.lock.min

      - name: Generate the current version lockfile
        run: cargo update

      - name: Upload the Cargo lockfiles
        uses: actions/upload-artifact@v7
        with:
          name: Cargo.lock
          path: |
            Cargo.lock
            Cargo.lock.min

  check:
    name: Check
    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: ["1.87", stable, nightly]
        lock: ["Cargo.lock", "Cargo.lock.min"]
    runs-on: ${{ matrix.os }}
    needs: lock

    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v6

      - name: Install the Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          target: wasm32-wasip1
          override: true

      - name: Install power tools
        uses: taiki-e/install-action@cargo-hack

      - name: Download the Cargo lockfiles
        uses: actions/download-artifact@v8
        with:
          name: Cargo.lock

      - name: Rename ${{ matrix.lock }} to Cargo.lock
        run: mv ${{ matrix.lock }} Cargo.lock
        if: ${{ matrix.lock != 'Cargo.lock' }}

      - name: Check the powerset
        run: |
          cargo hack check --all \
            --feature-powerset --keep-going

      - name: Check the powerset on wasm32-wasip1
        run: |
          cargo hack check --all \
            --exclude numcodecs-python \
            --exclude numcodecs-ebcc \
            --exclude numcodecs-jpeg2000 \
            --exclude numcodecs-lc \
            --exclude numcodecs-pressio \
            --exclude numcodecs-qpet-sperr \
            --exclude numcodecs-sperr \
            --exclude numcodecs-sz3 \
            --exclude numcodecs-tthresh \
            --exclude numcodecs-zfp \
            --exclude numcodecs-zfp-classic \
            --exclude numcodecs-zstd \
            --feature-powerset --keep-going \
            --target wasm32-wasip1

  test:
    name: Test Suite
    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: [stable]
        lock: ["Cargo.lock", "Cargo.lock.min"]
    runs-on: ${{ matrix.os }}
    needs: lock

    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install the Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true

      - name: Install power tools
        uses: taiki-e/install-action@cargo-hack

      - name: Download the Cargo lockfiles
        uses: actions/download-artifact@v8
        with:
          name: Cargo.lock

      - name: Rename ${{ matrix.lock }} to Cargo.lock
        run: mv ${{ matrix.lock }} Cargo.lock
        if: ${{ matrix.lock != 'Cargo.lock' }}

      - name: Run the test-suite powerset
        run: |
          cargo hack test --workspace \
            --no-fail-fast --feature-powerset --keep-going \
            --exclude numcodecs-python \
            --release

  test-numcodecs-python:
    name: Test Suite
    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: [stable]
        lock: ["Cargo.lock", "Cargo.lock.min"]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    needs: lock

    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v6

      - name: Install the Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install power tools
        uses: taiki-e/install-action@cargo-hack

      - name: Install numcodecs
        run: pip install numcodecs

      - name: Download the Cargo lockfiles
        uses: actions/download-artifact@v8
        with:
          name: Cargo.lock

      - name: Rename ${{ matrix.lock }} to Cargo.lock
        run: mv ${{ matrix.lock }} Cargo.lock
        if: ${{ matrix.lock != 'Cargo.lock' }}

      - name: Run the test-suite powerset
        run: |
          cargo hack test --package numcodecs-python \
            --no-fail-fast --feature-powerset --keep-going \
            --release

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v6

      - name: Install the Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: nightly
          profile: minimal
          components: rustfmt
          override: true

      - name: Check the code formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: ["1.87", stable]
        lock: ["Cargo.lock", "Cargo.lock.min"]
    runs-on: ${{ matrix.os }}
    needs: lock

    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v6

      - name: Install the Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          target: wasm32-wasip1
          components: clippy
          override: true

      - name: Install power tools
        uses: taiki-e/install-action@cargo-hack

      - name: Download the Cargo lockfiles
        uses: actions/download-artifact@v8
        with:
          name: Cargo.lock

      - name: Rename ${{ matrix.lock }} to Cargo.lock
        run: mv ${{ matrix.lock }} Cargo.lock
        if: ${{ matrix.lock != 'Cargo.lock' }}

      - name: Check the code style powerset
        if: ${{ matrix.rust == 'stable' && matrix.lock == 'Cargo.lock' }}
        run: |
          cargo hack clippy --all \
            --feature-powerset --keep-going \
            -- -D warnings

      - name: Check the code style powerset
        if: ${{ matrix.rust != 'stable' || matrix.lock != 'Cargo.lock' }}
        run: |
          cargo hack clippy --all \
            --feature-powerset --keep-going \
            -- -D warnings -A unknown-lints -A clippy::multiple-crate-versions

      - name: Check the code style powerset on wasm32-wasip1
        if: ${{ matrix.rust == 'stable' && matrix.lock == 'Cargo.lock' }}
        run: |
          cargo hack clippy --all \
            --exclude numcodecs-python \
            --exclude numcodecs-ebcc \
            --exclude numcodecs-jpeg2000 \
            --exclude numcodecs-lc \
            --exclude numcodecs-pressio \
            --exclude numcodecs-qpet-sperr \
            --exclude numcodecs-sperr \
            --exclude numcodecs-sz3 \
            --exclude numcodecs-tthresh \
            --exclude numcodecs-zfp \
            --exclude numcodecs-zfp-classic \
            --exclude numcodecs-zstd \
            --feature-powerset --keep-going \
            --target wasm32-wasip1 \
            -- -D warnings

      - name: Check the code style powerset on wasm32-wasip1
        if: ${{ matrix.rust != 'stable' || matrix.lock != 'Cargo.lock' }}
        run: |
          cargo hack clippy --all \
            --exclude numcodecs-python \
            --exclude numcodecs-ebcc \
            --exclude numcodecs-jpeg2000 \
            --exclude numcodecs-lc \
            --exclude numcodecs-pressio \
            --exclude numcodecs-qpet-sperr \
            --exclude numcodecs-sperr \
            --exclude numcodecs-sz3 \
            --exclude numcodecs-tthresh \
            --exclude numcodecs-zfp \
            --exclude numcodecs-zfp-classic \
            --exclude numcodecs-zstd \
            --feature-powerset --keep-going \
            --target wasm32-wasip1 \
            -- -D warnings -A unknown-lints -A clippy::multiple-crate-versions

  codecs-ls:
    name: List the codecs
    runs-on: ubuntu-latest
    outputs:
      codecs: ${{ steps.codecs.outputs.codecs }}

    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v6

      - name: List the codecs
        id: codecs
        run: echo "codecs=$(ls codecs | jq -R -s -c 'split("\n")[:-1]')" >> "$GITHUB_OUTPUT"

  wasm-codec-build:
    name: Build the ${{ matrix.codec }} WASM codec
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        rust: [stable]
        lock: ["Cargo.lock", "Cargo.lock.min"]
        codec: ${{ fromJSON(needs.codecs-ls.outputs.codecs) }}
    runs-on: ${{ matrix.os }}
    needs: ["lock", "codecs-ls", "numcodecs-wasm"]

    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v6

      - name: Install nix
        uses: cachix/install-nix-action@v31

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true

      - name: Download the Cargo lockfiles
        uses: actions/download-artifact@v8
        with:
          name: Cargo.lock

      - name: Rename ${{ matrix.lock }} to Cargo.lock
        run: mv ${{ matrix.lock }} Cargo.lock
        if: ${{ matrix.lock != 'Cargo.lock' }}

      - name: Download numcodecs-wasm
        uses: actions/download-artifact@v8
        with:
          pattern: numcodecs-wasm
          path: py/numcodecs-wasm-materialize

      - name: Build the ${{ matrix.codec }} WASM codec
        run: |
          cd py/numcodecs-wasm-materialize
          rm .python-version
          uv python install ${{ matrix.python }}
          uv sync && uv pip install .
          uv run python -m numcodecs_wasm_materialize \
            "^${{ matrix.codec }}$" \
            --local \
            --numcodecs-wasm-wheel numcodecs_wasm-*.whl

      - name: Upload the ${{ matrix.codec }} WASM codec
        if: ${{ matrix.lock == 'Cargo.lock' }}
        uses: actions/upload-artifact@v7
        with:
          name: wasm-${{ matrix.codec }}-codec
          path: py/numcodecs-wasm-materialize/dist

  numcodecs-wasm:
    name: Build numcodecs-wasm
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Build the numcodecs-wasm wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: py/numcodecs-wasm
          target: x86_64
          args: --release --out dist --interpreter /opt/python/cp310-cp310/bin/python3
          sccache: "true"
          manylinux: auto

      - name: Upload the numcodecs-wasm wheel
        uses: actions/upload-artifact@v7
        with:
          name: numcodecs-wasm
          path: py/numcodecs-wasm/dist

  numcodecs-wasm-pyemscripten:
    name: Build numcodecs-wasm for PyEmscripten
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.14"]

    steps:
      - name: Checkout the Repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install pyodide-build
        run: python -m pip install pyodide-build

      - name: Get the pyodide config
        id: pyodide-config
        run: |
          echo "rust-toolchain=$(pyodide config get rust_toolchain)" >> "$GITHUB_OUTPUT"
          echo "emscripten-version=$(pyodide config get emscripten_version)" >> "$GITHUB_OUTPUT"
          echo "pyodide-abi-version=$(pyodide config get pyodide_abi_version)" >> "$GITHUB_OUTPUT"
          echo "rustflags=$(pyodide config get rustflags)" >> "$GITHUB_OUTPUT"

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: ${{ steps.pyodide-config.outputs.emscripten-version }}

      - name: Build the numcodecs-wasm wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: py/numcodecs-wasm
          target: wasm32-unknown-emscripten
          args: --release --out dist --interpreter ${{ matrix.python }}
          rust-toolchain: ${{ steps.pyodide-config.outputs.rust-toolchain }}
        env:
          CARGO_TARGET_WASM32_UNKNOWN_EMSCRIPTEN_RUSTFLAGS: ${{ steps.pyodide-config.outputs.rustflags }}
          MATURIN_PYEMSCRIPTEN_PLATFORM_VERSION: ${{ steps.pyodide-config.outputs.pyodide-abi-version }}

      - name: Upload the numcodecs-wasm wheel
        uses: actions/upload-artifact@v7
        with:
          name: numcodecs-wasm-pyemscripten-${{ matrix.python }}
          path: py/numcodecs-wasm/dist

  wasm-codecs-test:
    name: Test the WASM codecs
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    needs: ["wasm-codec-build", "numcodecs-wasm"]
    if: always()

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Download the WASM codecs
        uses: actions/download-artifact@v8
        with:
          pattern: wasm-*-codec
          path: dist
          merge-multiple: true

      - name: Install the WASM codecs
        run: |
          uv venv
          uv python install ${{ matrix.python }}
          ls dist/*.whl | xargs -n 1 uv pip install

      - name: Test the WASM codecs (PyPi numcodecs-wasm)
        if: always()
        run: |
          uv run python -c "from pathlib import Path; errors = []; [exec('try:\n    import ' + p.name.split('-')[0] + ' as c; print(c)\nexcept ImportError as err:\n    errors.append(err)') for p in sorted(Path('dist').glob('*.whl'))]; exec('if len(errors) > 0:\n    raise Exception(errors)')"

      - name: Download numcodecs-wasm
        if: always()
        uses: actions/download-artifact@v8
        with:
          pattern: numcodecs-wasm
          path: dist

      - name: Install numcodecs-wasm
        if: always()
        run: |
          uv pip install dist/numcodecs_wasm-*.whl
          ls dist/*.whl | xargs -n 1 uv pip install

      - name: Test importing the WASM codecs (local numcodecs-wasm)
        if: always()
        run: |
          uv run python -c "from pathlib import Path; errors = []; [exec('try:\n    import ' + p.name.split('-')[0] + ' as c; print(c)\nexcept ImportError as err:\n    errors.append(err)') for p in sorted(Path('dist').glob('*.whl'))]; exec('if len(errors) > 0:\n    raise Exception(errors)')"

  wasm-codecs-test-pyemscripten:
    name: Test the WASM codecs on PyEmscripten
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python:
          - version: 3.14
            numpy: https://cdn.jsdelivr.net/pyodide/v314.0.0a2/full/numpy-2.4.3-cp314-cp314-pyemscripten_2026_0_wasm32.whl
    runs-on: ${{ matrix.os }}
    needs: ["wasm-codec-build", "numcodecs-wasm-pyemscripten"]
    if: always()

    steps:
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python.version }}

      - name: Download the WASM codecs
        uses: actions/download-artifact@v8
        with:
          pattern: wasm-*-codec
          path: dist
          merge-multiple: true

      - name: Download numcodecs-wasm
        if: always()
        uses: actions/download-artifact@v8
        with:
          pattern: numcodecs-wasm-pyemscripten-${{ matrix.python.version }}
          path: dist

      - name: Create the Pyodide venv and install the WASM codecs
        run: |
          python -m pip install pyodide-build
          pyodide venv .venv-pyodide
          source .venv-pyodide/bin/activate
          python -m pip install ${{ matrix.python.numpy }}
          ls dist/*.whl | xargs -n 1 python -m pip install

      - name: Test importing the WASM codecs (local numcodecs-wasm)
        run: |
          source .venv-pyodide/bin/activate
          python -c "from pathlib import Path; errors = []; [exec('try:\n    import ' + p.name.split('-')[0] + ' as c; print(c)\nexcept ImportError as err:\n    errors.append(err)') for p in sorted(Path('dist').glob('*.whl'))]; exec('if len(errors) > 0:\n    raise Exception(errors)')"
